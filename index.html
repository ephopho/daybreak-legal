<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daybreak — Legal</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.65; margin: 0; padding: 0 20px 80px;
    background: #FFFDF9; color: #1C1C1E;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #0A0A0C; color: #EDEDF0; }
    a { color: #FF8C5A !important; }
    .muted { color: #98989F !important; }
  }
  main { max-width: 720px; margin: 0 auto; }
  h1 { font-family: Georgia, "Times New Roman", serif; font-size: 34px; margin: 48px 0 8px; }
  .muted { color: #636366; }
  .brand { display: flex; align-items: center; gap: 10px; padding-top: 28px; }
  .brand img { height: 36px; width: auto; }
  .brand .wm { font-family: 'Montserrat', -apple-system, sans-serif; font-weight: 700; font-size: 22px; letter-spacing: -0.3px; }
  .brand .wm .d { color: #FF6B35; }
  a { color: #E55A2B; font-size: 18px; }
  li { margin: 10px 0; }
</style>
</head>
<body>
<main>
  <div class="brand"><img src="logo.png" alt="Daybreak logo"><span class="wm"><span class="d">Day</span>break</span></div>
  <h1>Legal</h1>
  <p class="muted">Daybreak — your AI morning briefing. Calendar, weather, and one daily focus in a single card.</p>
  <ul>
    <li><a href="privacy/">Privacy Policy</a></li>
    <li><a href="terms/">Terms of Service</a></li>
  </ul>
</main>
</body>
</html>
