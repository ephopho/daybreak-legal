<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daybreak — Legal</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.65; margin: 0; padding: 0 20px 80px;
    background: #FFFDF9; color: #1C1C1E;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #0A0A0C; color: #EDEDF0; }
    a { color: #FF8C5A !important; }
    .muted { color: #98989F !important; }
    .brand img {
      box-shadow: 0 6px 28px rgba(255, 107, 53, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  }
  main { max-width: 720px; margin: 0 auto; }
  h1 { font-family: Georgia, "Times New Roman", serif; font-size: 34px; margin: 48px 0 8px; }
  .muted { color: #636366; }
  .brand { display: flex; justify-content: center; padding-top: 40px; }
  .brand img {
    height: 80px;
    width: auto;
    border-radius: 20px;
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
  }
  a { color: #E55A2B; font-size: 18px; }
  li { margin: 10px 0; }
</style>
</head>
<body>
<main>
  <div class="brand"><img src="logo.png" alt="Daybreak logo"></div>
  <h1>Legal</h1>
  <p class="muted">Daybreak — your AI morning briefing. Calendar, weather, and one daily focus in a single card.</p>
  <ul>
    <li><a href="privacy/">Privacy Policy</a></li>
    <li><a href="terms/">Terms of Service</a></li>
    <li><a href="support/">Support</a></li>
  </ul>
</main>
</body>
</html>
